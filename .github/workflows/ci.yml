name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest
          package-cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Install Xlings
        run: curl -fsSL https://d2learn.org/xlings-install.sh | bash

      - name: Install GCC 15.1 with Xlings
        run: |
          export PATH=/home/xlings/.xlings_data/bin:$PATH
          xlings install gcc@15.1 -y

      - name: Build
        run: |
          export PATH=/home/xlings/.xlings_data/bin:$PATH
          xmake f -m release -y
          xmake -j$(nproc)

      - name: Test
        run: |
          export PATH=/home/xlings/.xlings_data/bin:$PATH
          xmake run templates_test

      - name: Run examples
        run: |
          export PATH=/home/xlings/.xlings_data/bin:$PATH
          xmake run basic

  build-macos:
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install xmake llvm@20

      - name: Build
        run: |
          export PATH=/opt/homebrew/opt/llvm@20/bin:$PATH
          xmake f --toolchain=llvm --sdk=/opt/homebrew/opt/llvm@20 -y
          xmake -m release -y
          xmake -j$(sysctl -n hw.ncpu)

      - name: Test
        run: xmake run templates_test

      - name: Run examples
        run: xmake run basic

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest
          package-cache: true

      - name: Build
        run: |
          xmake f -m release -y
          xmake -j$env:NUMBER_OF_PROCESSORS

      - name: Test
        run: xmake run templates_test

      - name: Run examples
        run: xmake run basic
